<div class="inscription container my-5">
    <h1>Inscription</h1>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="nom">Nom</label>
        <input type="text" id="nom" class="form-control" [(ngModel)]="user.nom" name="nom" required>
      </div>
  
      <div class="form-group">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" class="form-control" [(ngModel)]="user.prenom" name="prenom" required>
      </div>
  
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-control" [(ngModel)]="user.email" name="email" required>
      </div>
  
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" class="form-control" [(ngModel)]="user.password" name="password" required>
      </div>
  
      <!-- Suppression du champ 'Type d'utilisateur' -->
  
      <button type="submit" class="btn btn-primary">S'inscrire</button>
    </form>
  </div>
