<div class="dashboard-community container my-5">
    <h1>Gestion des Posts</h1>
  
    <!-- Formulaire pour créer un nouveau post -->
    <form (ngSubmit)="onSubmit()" enctype="multipart/form-data">
        <div class="form-group">
          <label for="titre">Titre</label>
          <input type="text" id="titre" class="form-control" [(ngModel)]="post.titre" name="titre" required>
        </div>
      
        <div class="form-group">
          <label for="photo">Photo ou Vidéo</label>
          <input type="file" id="photo" class="form-control" (change)="onFileChange($event)" name="photo">
        </div>
      
        <div class="form-group">
          <label for="texte">Texte de Commentaire</label>
          <textarea id="texte" class="form-control" [(ngModel)]="post.texte" name="texte" required></textarea>
        </div>
      
        <button type="submit" class="btn btn-primary">Créer Post</button>
    </form>
      
    <!-- Liste des posts existants -->
    <h2 class="mt-5">Posts Existants</h2>
    <div *ngFor="let post of posts" class="post my-3 p-3 border">
      <h3>{{ post.titre }}</h3>
      <!-- Ajout du préfixe correct pour afficher les images en base64 -->
      <img *ngIf="post.photo" [src]="'data:image/jpeg;base64,' + post.photo" alt="Post Image" class="img-fluid">
      <p>{{ post.texte }}</p>
      <button class="btn btn-warning mr-2" (click)="onEditPost(post)">Modifier</button>
      <button class="btn btn-danger" (click)="deletePost(post.id)">Supprimer</button>
    </div>

    <div *ngIf="editMode">
        <h2>Modifier le Post</h2>
        <form (ngSubmit)="updatePost()">
          <input type="text" [(ngModel)]="selectedPost.titre" name="titre" placeholder="Titre" required>
          <textarea [(ngModel)]="selectedPost.texte" name="texte" placeholder="Texte" required></textarea>
          <input type="file" (change)="onFileChange($event)" />
          <button type="submit">Enregistrer</button>
          <button type="button" (click)="editMode = false">Annuler</button>
        </form>
    </div>
</div>
