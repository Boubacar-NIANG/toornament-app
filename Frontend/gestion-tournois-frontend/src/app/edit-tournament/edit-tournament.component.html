<main class="content">
<div class="edit-tournament-container">
  <h2>Modifier Tournoi</h2>
  <form (ngSubmit)="updateTournament()">
    <div class="form-group">
      <label>Nom du Tournoi</label>
      <input type="text" [(ngModel)]="tournament.nom" name="tournamentName" required class="form-control">
    </div>
    <div class="form-group">
      <label>Catégorie</label>
      <select [(ngModel)]="tournament.categorie" name="tournamentCategory" required class="form-control">
        <option value="Football">Football</option>
        <option value="Basketball">Basketball</option>
        <option value="Handball">Handball</option>
      </select>
    </div>
    <div class="form-group">
      <label>Date du Tournoi</label>
      <input type="date" [(ngModel)]="tournament.date" name="tournamentDate" required class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Mettre à jour le Tournoi</button>
  </form>
</div>
</main>
</div>
