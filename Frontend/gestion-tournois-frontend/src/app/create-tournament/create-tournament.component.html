<main class="content">
<div class="create-tournament-container">
  <h2>Créer un Nouveau Tournoi</h2>
  <form (ngSubmit)="createTournament()">
    <div class="form-group">
      <label>Nom du Tournoi</label>
      <input type="text" [(ngModel)]="tournament.nom" name="tournamentName" required class="form-control">
    </div>
    <div class="form-group">
      <label>Catégorie</label>
      <select [(ngModel)]="tournament.categorie" name="tournamentCategory" required class="form-control">
        <option value="Football">Football</option>
        <option value="Basketball">Basketball</option>
        <option value="Handball">Handball</option>
      </select>
    </div>
    <div class="form-group">
      <label>Date du Tournoi</label>
      <input type="date" [(ngModel)]="tournament.date" name="tournamentDate" required class="form-control">
    </div>

    <!-- Section Community Manager -->
    <h3>Inscription du Community Manager</h3>
    <div class="form-group">
      <label>Nom</label>
      <input type="text" [(ngModel)]="communityManager.nom" name="communityManagerName" required class="form-control">
    </div>
    <div class="form-group">
      <label>Prénom</label>
      <input type="text" [(ngModel)]="communityManager.prenom" name="communityManagerFirstName" required class="form-control">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="communityManager.email" name="communityManagerEmail" required class="form-control">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="communityManager.password" name="communityManagerPassword" required class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Créer Tournoi</button>
  </form>
</div>
</main>
</div>
